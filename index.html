<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EMTS Scanner</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="EMTS Scanner">
  <link rel="apple-touch-icon" href="icon.svg">

  <link rel="stylesheet" href="style.css">

  <!-- sql.js (SQLite via WASM) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"
          crossorigin="anonymous"></script>

  <!-- html5-qrcode (QR + 1D barcode scanner) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
          crossorigin="anonymous"></script>
</head>
<body>

  <header>
    <div class="header-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
        <rect x="7" y="7" width="2.5" height="10" rx="1" fill="white" stroke="none"/>
        <rect x="11" y="7" width="1.2" height="10" rx="0.5" fill="white" stroke="none"/>
        <rect x="14" y="7" width="3" height="10" rx="1" fill="white" stroke="none"/>
      </svg>
    </div>
    <h1>EMTS Scanner</h1>
    <span id="statusBadge" class="status-badge">Initializing…</span>
  </header>

  <div id="prcBanner" class="prc-banner" hidden>
    <div class="prc-banner-label">Latest PRC</div>
    <div id="prcBannerValue" class="prc-banner-value"></div>
    <div id="prcBannerTime" class="prc-banner-time"></div>
  </div>

  <main>

    <!-- Scanner card -->
    <section class="scanner-card">
      <div class="scanner-viewfinder">
        <div id="reader"></div>
        <div id="lastScanBar" class="last-scan-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span id="lastScanText" class="last-scan-text"></span>
        </div>
      </div>

      <div class="scanner-controls">
        <button id="scanBtn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 7l-7 5 7 5V7z"/>
            <rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
          Start Scanner
        </button>

        <label class="btn btn-ghost" for="fileInput" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Scan Image
        </label>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>
    </section>

    <!-- History table -->
    <section class="table-card">
      <div class="table-header">
        <div class="table-title">
          <h2>Scan History</h2>
          <span id="scanCount" class="scan-count">0 scans</span>
        </div>
        <div class="table-actions">
          <button id="exportBtn" class="btn btn-ghost btn-sm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Export CSV
          </button>
          <button id="clearBtn" class="btn btn-danger btn-sm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            </svg>
            Clear All
          </button>
        </div>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Format</th>
              <th>Scanned At</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="scansBody">
            <tr><td colspan="4" class="empty-state">
              <div class="empty-state-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
                  <rect x="7" y="7" width="3" height="10" rx="1"/>
                  <rect x="11" y="7" width="1.5" height="10" rx="0.5"/>
                  <rect x="14" y="7" width="3" height="10" rx="1"/>
                </svg>
              </div>
              No scans yet — start the scanner or upload an image
            </td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
